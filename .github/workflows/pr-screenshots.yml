name: PR Screenshots

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: write
    pull-requests: write
    models: read

jobs:
    screenshots:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get changed files
              run: |
                  git fetch origin ${{ github.base_ref }}
                  git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
                  echo "Changed files:"
                  cat /tmp/changed_files.txt

            - name: Build AI prompt
              run: |
                  {
                    echo "Changed files in this PR:"
                    cat /tmp/changed_files.txt
                  } > /tmp/ai-prompt.txt

            - name: Decide screenshots
              id: decide
              uses: actions/ai-inference@v2
              with:
                  model: openai/gpt-4o-mini
                  token: ${{ github.token }}
                  system-prompt: |
                      You decide which Quickshell UI apps need screenshots based on changed files.

                      Available apps:
                      - kh-launcher: searchable application launcher
                        Good shots: "default" (no ipc), "search" (ipc: ["type fire"]), "help" (ipc: ["type ?"])
                      - kh-cliphist: clipboard history overlay
                        Good shots: "default" (no ipc), "help" (ipc: ["setView help"])

                      Never include kh-view — it requires file arguments, skip it always.

                      File-to-app hints:
                      - qml/AppList*, qml/kh-launcher* → kh-launcher
                      - qml/Cliphist*, qml/kh-cliphist* → kh-cliphist
                      - lib/*, config.nix, ffi.nix → kh-launcher and kh-cliphist

                      Be selective: only include shots that show the affected UI.
                      A small focused change warrants 1-2 shots, not an exhaustive set.

                      Output ONLY a valid JSON array, no markdown fences, no explanation:
                      [{"app":"kh-launcher","shots":[{"name":"default"},{"name":"search","ipc":["type fire"]}]}]

                      If no screenshottable app is affected, output exactly: []
                  prompt-file: /tmp/ai-prompt.txt

            - name: Parse plan
              id: plan
              env:
                  AI_RESPONSE: ${{ steps.decide.outputs.response }}
              run: |
                  python3 - << 'EOF'
                  import re, json, os

                  response = os.environ.get('AI_RESPONSE', '[]').strip()
                  response = re.sub(r'```(?:json)?\s*', '', response).strip()
                  try:
                      parsed = json.loads(response)
                      if not isinstance(parsed, list):
                          parsed = []
                  except Exception:
                      parsed = []

                  out = json.dumps(parsed)
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f'json={out}\n')
                      f.write(f'needed={"true" if parsed else "false"}\n')

                  print(f"Plan: {out}")
                  EOF

            - name: Install Nix
              if: steps.plan.outputs.needed == 'true'
              uses: cachix/install-nix-action@v31
              with:
                  nix_path: nixpkgs=channel:nixos-unstable
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Cache Nix store
              if: steps.plan.outputs.needed == 'true'
              uses: nix-community/cache-nix-action@v5
              with:
                  primary-key: nix-screenshots-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
                  restore-prefixes-first-match: nix-screenshots-${{ runner.os }}-

            - name: Take screenshots
              if: steps.plan.outputs.needed == 'true'
              env:
                  SCREENSHOT_PLAN: ${{ steps.plan.outputs.json }}
                  # Force Qt Quick software renderer — no GPU available in CI,
                  # which causes OpenGL to silently fail and produce black frames.
                  QT_QUICK_BACKEND: software
                  # Use fixture data instead of real system state (no installed
                  # apps or clipboard history available on CI runners).
                  KH_SCREENSHOT_FIXTURES: "1"
              run: |
                  python3 - << 'EOF'
                  import json, subprocess, os, shutil

                  plan = json.loads(os.environ['SCREENSHOT_PLAN'])
                  outdir = '/tmp/pr-screenshots'
                  os.makedirs(outdir, exist_ok=True)

                  for entry in plan:
                      app = entry['app']
                      shots = entry['shots']

                      # nix run .#screenshot -- <app> <shot1> [ipc...] [-- <shot2> [ipc...]]...
                      args = ['nix', 'run', '.#screenshot', '--', app]
                      for i, shot in enumerate(shots):
                          if i > 0:
                              args.append('--')
                          args.append(shot['name'])
                          args.extend(shot.get('ipc', []))

                      print(f"Running: {' '.join(args)}", flush=True)
                      result = subprocess.run(args, capture_output=True, text=True, check=True)

                      paths = [p for p in result.stdout.strip().split('\n') if p]
                      for path, shot in zip(paths, shots):
                          dest = f"{outdir}/{app}-{shot['name']}.png"
                          shutil.copy2(path, dest)
                          print(f"Saved: {dest}", flush=True)
                  EOF

            - name: Push to screenshots branch
              if: steps.plan.outputs.needed == 'true'
              id: push
              run: |
                  pr=${{ github.event.pull_request.number }}
                  sha=${{ github.event.pull_request.head.sha }}
                  short=${sha:0:7}

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git fetch origin screenshots 2>/dev/null || true

                  if git ls-remote --heads origin screenshots | grep -q .; then
                      git branch screenshots origin/screenshots
                      git worktree add /tmp/ss-branch screenshots
                  else
                      git worktree add --orphan -b screenshots /tmp/ss-branch
                  fi

                  dest="/tmp/ss-branch/pr-${pr}/${short}"
                  mkdir -p "$dest"
                  cp /tmp/pr-screenshots/*.png "$dest/"

                  cd /tmp/ss-branch
                  git add .
                  git commit -m "screenshots: PR #${pr} @ ${short}"
                  git push origin HEAD:screenshots

                  repo=${{ github.repository }}
                  echo "base_url=https://raw.githubusercontent.com/${repo}/screenshots/pr-${pr}/${short}" >> $GITHUB_OUTPUT

            - name: Post PR comment
              if: steps.plan.outputs.needed == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
                  SCREENSHOT_PLAN: ${{ steps.plan.outputs.json }}
                  BASE_URL: ${{ steps.push.outputs.base_url }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  python3 - << 'EOF'
                  import json, os, subprocess

                  plan = json.loads(os.environ['SCREENSHOT_PLAN'])
                  base_url = os.environ['BASE_URL']
                  pr = os.environ['PR_NUMBER']

                  lines = ['## Screenshots', '']
                  for entry in plan:
                      app = entry['app']
                      lines.append(f'### {app}')
                      lines.append('')
                      for shot in entry['shots']:
                          name = shot['name']
                          url = f"{base_url}/{app}-{name}.png"
                          lines.append(f'**{name}**')
                          lines.append('')
                          lines.append(f'![{app} \u2014 {name}]({url})')
                          lines.append('')

                  body = '\n'.join(lines)
                  subprocess.run(['gh', 'pr', 'comment', pr, '--body', body], check=True)
                  print("Comment posted.")
                  EOF
